<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="100%">
  <defs>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0L0 0 0 20" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
      .sans { font-family: 'Inter', sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="120" fill="#07080d"/>
  <rect width="1000" height="120" fill="url(#grid)"/>

  <!-- Background delicate DAG / constellation lines -->
  <g stroke="rgba(255,0,161,0.15)" stroke-width="1" fill="none">
    <path d="M150,30 Q250,90 350,40" stroke-dasharray="4,4"/>
    <path d="M650,40 Q750,90 850,30" stroke-dasharray="4,4"/>
  </g>
  <g fill="#FF00A1" opacity="0.4">
    <circle cx="150" cy="30" r="1.5"/>
    <circle cx="350" cy="40" r="1.5"/>
    <circle cx="650" cy="40" r="1.5"/>
    <circle cx="850" cy="30" r="1.5"/>
  </g>

  <!-- Title -->
  <g transform="translate(500, 65)">
    <text x="-85" y="12" class="mono" font-size="46" fill="#FF00A1" text-anchor="middle" filter="url(#glow-pink)">{</text>
    <text x="0" y="12" class="mono" font-size="48" fill="#FFF4BD" text-anchor="middle" filter="url(#glow-yellow)" letter-spacing="0.15em">NOUZ</text>
    <text x="95" y="12" class="mono" font-size="46" fill="#FF00A1" text-anchor="middle" filter="url(#glow-pink)">}</text>
    
    <text x="0" y="38" class="sans" font-size="9" fill="#8892a4" font-weight="500" text-anchor="middle" letter-spacing="0.4em">COGNITIVE ARCHITECTURE &amp; RECURSIVE SELF-ORGANIZATION</text>
  </g>
</svg>