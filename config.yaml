# =============================================================================
# Nouz MCP Server Configuration (optional)
# =============================================================================

# Mode: luca | prizma | sloi
# - luca: Graph-based, no semantic classification
# - prizma: Graph-based with semantic classification and core_mix
# - sloi: Strict 5-level hierarchy with semantic classification
mode: prizma

# Semantic etalons (optional) — for better semantic classification
# You can start with just level/type in YAML, etalons are optional
# Recommended: use 3 distinct domains with cosine < 0.55 between them
etalons:
  - sign: M
    name: Logic
    text: "syllogism дедукция axiomatic аксиома proof теорема logical argument философское reasoning рассуждение fallacy заблуждение"
  - sign: C
    name: Astrophysics
    text: "supernova сверхновая exoplanet экзопланета dark matter тёмная материя quasar квазар black hole чёрная дыра stellar звёздный"
  - sign: P
    name: Biology
    text: "DNA ДНК genome геном CRISPR gene editing белок protein фермент metabolism метаболизм cell клетка neuron нейрон"

levels:
  core: 1
  pattern: 2
  module: 3
  quant: 4
  artifact: 5

thresholds:
  sign_spread: 0.05
  confident_cosine: 0.75
  pattern_second_sign_threshold: 30.0
  semantic_bridge_threshold: 0.55
