<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%">
  <defs>
    <filter id="f-glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/><feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@400;600&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
      .sans { font-family: 'Inter', sans-serif; }
      .desc { font-size: 13px; fill: #8892a4; line-height: 1.6; }
      .box { fill: #0f1018; stroke: #1a1d2e; stroke-width: 1; rx: 12; transition: all 0.3s; }
    </style>
  </defs>

  <rect width="1000" height="200" fill="#07080d"/>

  <g transform="translate(20, 20)">
    <!-- LUCA -->
    <g transform="translate(0, 0)">
      <rect width="306" height="160" class="box"/>
      <circle cx="45" cy="45" r="18" fill="#07080d" stroke="#BC1F50" stroke-width="1.5" filter="url(#f-glow-red)"/>
      <text x="45" y="49" class="mono" font-size="14" fill="#BC1F50" text-anchor="middle">{ }</text>
      <text x="78" y="51" class="mono" font-size="16" fill="#BC1F50" letter-spacing="0.05em">LUCA</text>
      
      <text x="30" y="90" class="sans desc">Pure DAG graph structure.</text>
      <text x="30" y="112" class="sans desc">No embeddings required.</text>
      <text x="30" y="134" class="sans desc">Entity formulas &amp; manual links.</text>
    </g>

    <!-- PRIZMA -->
    <g transform="translate(326, 0)">
      <rect width="306" height="160" class="box"/>
      <circle cx="45" cy="45" r="18" fill="#07080d" stroke="#D06AFF" stroke-width="1.5" filter="url(#f-glow-purple)"/>
      <text x="45" y="49" class="mono" font-size="14" fill="#D06AFF" text-anchor="middle">[ ]</text>
      <text x="78" y="51" class="mono" font-size="16" fill="#D06AFF" letter-spacing="0.05em">PRIZMA</text>
      
      <text x="30" y="90" class="sans desc">Semantic classification.</text>
      <text x="30" y="112" class="sans desc">Drift detection &amp; core_mix.</text>
      <text x="30" y="134" class="sans desc">Cross-domain semantic bridges.</text>
    </g>

    <!-- SLOI -->
    <g transform="translate(652, 0)">
      <rect width="306" height="160" class="box"/>
      <circle cx="45" cy="45" r="18" fill="#07080d" stroke="#448CAA" stroke-width="1.5" filter="url(#f-glow-blue)"/>
      <text x="45" y="49" class="mono" font-size="10" fill="#448CAA" text-anchor="middle">L1-5</text>
      <text x="78" y="51" class="mono" font-size="16" fill="#448CAA" letter-spacing="0.05em">SLOI</text>
      
      <text x="30" y="90" class="sans desc">Strict 5-level hierarchy.</text>
      <text x="30" y="112" class="sans desc">Automated level enforcement.</text>
      <text x="30" y="134" class="sans desc">Constraint-driven DAG building.</text>
    </g>
  </g>
</svg>